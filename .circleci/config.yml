version: 2.1

orbs:
  codecov: codecov/codecov@1.2.3

defaults: &defaults
  working_directory: ~/project
  docker:
    - image: cimg/node:14.17-browsers

aliases:
  - &restore_cache
    name: Restore Yarn Package Cache
    key: yarn-packages-{{ checksum "yarn.lock" }}

  - &save_cache
    name: Save Yarn Package Cache
    key: yarn-packages-{{ checksum "yarn.lock" }}
    paths:
      - node_modules/
      - ~/.cache
  - &install
    name: Install Dependencies
    command: yarn install --frozen-lockfile --non-interactive

jobs:
  install:
    <<: *defaults
    steps:
      - checkout
      - restore_cache: *restore_cache
      - run: *install
      - save_cache: *save_cache
      - persist_to_workspace:
          root: ~/
          paths:
            - ./project
  lint:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/
      - run: yarn lint
  test:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/
      - run: yarn test
      - codecov/upload
  build:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/
      - run:
          command: yarn build --ignore @cnamts/docs
          environment:
            NODE_OPTIONS: --max_old_space_size=4096
            CI: 'true'
            CIRCLE_NODE_TOTAL: '4'
  deploy:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/
      - run:
          name: Authenticate with registry
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
      - run:
          name: Publish packages
          command: yarn publish

workflows:
  lint_test_build:
    jobs:
      - install
      - lint:
          requires:
            - install
      - test:
          requires:
            - install
      - build:
          requires:
            - install
  lint_test_build_deploy:
    jobs:
      - install
      - hold_for_deploy:
          type: approval
          requires:
            - lint
            - test
            - build
      - deploy:
          requires:
            - hold_for_deploy
          filters:
            branches:
              only: test-ci
